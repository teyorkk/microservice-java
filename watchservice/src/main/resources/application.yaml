spring:
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_WATCHDB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:/db/migration
  jpa:
    hibernate:
      ddl-auto: true
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
    database: postgresql
  application:
    name: watchservice
server:
  port: 8082
jwt:
  secret: ${JWT_SECRET}
