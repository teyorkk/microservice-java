spring:
  application:
    name: AuthService
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: org.postgresql.driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
    database: postgresql

jwt:
  secret: ${JWT_SECRET}
