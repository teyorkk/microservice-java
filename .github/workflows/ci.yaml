name: thankyou

on:
  push:
    branches: ["main"]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [AuthService, movieservice, watchservice]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Compile and Run Test
        working-directory: ./${{ matrix.service }}
        run: mvn clean package

  security-sast:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/java"
  security-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        include:
          - service_path: AuthService
            image_name: authservice
          - service_path: movieservice
            image_name: movieservice
          - service_path: watchservice
            image_name: watchservice
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t ${{ matrix.image_name }}-img ./${{ matrix.service_path }}
